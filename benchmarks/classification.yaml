# benchmarks/classification.yaml
name: "Customer Support Classification"

inference:
  temperature: 0
  max_tokens: 1024  # reasoning models (e.g. poolside/laguna) need headroom beyond the label itself

evaluation:
  judge_model: "openai/gpt-oss-120b:free"
  judge_threshold: 0.70

prompts:
  - id: "v1"
    template: >
      Classify this conversation. Return only a single label from the list.
      No JSON, no explanation, no punctuation.
      Choose from: {{ labels }}.
      Conversation: {{ conversation }}

  - id: "v2"
    system: "You are an expert classification assistant."
    template: >
      Analyze the following conversation and return exactly one label from the list.
      Return only the label — no JSON, no explanation, no punctuation.
      Choose from: {{ labels }}.
      Conversation: {{ conversation }}

models:
  - "google/gemma-4-31b-it:free"
  - "poolside/laguna-xs.2:free"

variables:
  labels: "order_issue, billing, product_question, other"

test_cases:
  - id: "conv_001"
    variables:
      conversation: "I cannot find my last order."
    expected_output: "order_issue"
    evaluation: "exact_match"
    tags: ["order", "easy"]

  - id: "conv_002"
    variables:
      conversation: "What is included in my subscription plan?"
    evaluation: "llm_judge"
    criteria: >
      Should identify a billing or subscription inquiry.
      Must return a single label, no explanation.
    tags: ["billing", "medium"]

  - id: "conv_003"
    variables:
      conversation: "I was charged twice but the app shows one order."
    expected_output: "billing"
    evaluation: "exact_match"
    tags: ["billing", "edge_case"]