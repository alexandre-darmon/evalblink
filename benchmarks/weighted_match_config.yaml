# benchmarks/usage_classification.yaml
name: "ChatGPT Usage Classification"
judge_model: ""

inference:
  temperature: 0
  max_tokens: 4086

evaluation:
  quality_threshold: 0.80
  variables:
      - name: "use_case"
        weight: 0.50
      - name: "percent"
        weight: 0.25
        tolerance: 0.20
      - name: "order"
        weight: 0.25

prompts:
  - id: "v1"
    template: >
      Analyse cette conversation et identifie les cas d'usage présents.
      Retourne uniquement un JSON valide, sans explication, sans markdown.
      Format: [{"use_case": "<label>", "percent": <float>, "order": <int>}]
      Les pourcentages doivent sommer à 1.0.
      Use cases disponibles: {{ use_cases }}.
      Conversation: {{ conversation }}

models:
  - "poolside/laguna-xs.2:free"

variables:
  use_cases: "Translate content, Analyze content, Summarize content, Generate new ideas, Write content, Generate simple code, Other"

test_cases:
  - id: "conv_001"
    variables:
      conversation: |
        User: Fais moi une synthèse de ce document.
        User: Reformule le en 10 bullet points.
        User: Traduis le en anglais.
    expected_output:
      - use_case: "Summarize content"
        percent: 0.70
        order: 1
      - use_case: "Translate content"
        percent: 0.30
        order: 2
    evaluation: "weighted_match"
    tags: ["summarize", "translate"]

  - id: "conv_002"
    variables:
      conversation: |
        User: Analyse ces données de ventes et fais un graphique.
        User: Rédige un email pour présenter les résultats à mon manager.
    expected_output:
      - use_case: "Analyze content"
        percent: 0.60
        order: 1
      - use_case: "Write content"
        percent: 0.40
        order: 2
    evaluation: "weighted_match"
    tags: ["analyze", "writing"]

  - id: "conv_003"
    variables:
      conversation: |
        User: Traduis ce contrat en français.
        User: Résume les clauses principales.
        User: Rédige un email de synthèse.
    expected_output:
      - use_case: "Translate content"
        percent: 0.50
        order: 1
      - use_case: "Summarize content"
        percent: 0.30
        order: 2
      - use_case: "Write content"
        percent: 0.20
        order: 3
    evaluation: "weighted_match"
    tags: ["translate", "summarize", "writing"]